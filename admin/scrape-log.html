<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CKRTCSV8QH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-CKRTCSV8QH');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrape Log | Dynamic TX Entertainment</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <div class="admin-layout" id="admin-app" style="display: none;">
        <!-- Header -->
        <header class="admin-header">
            <div class="admin-header-left">
                <a href="../index.html" class="logo">
                    <img src="../assets/dtxent-logo.png" alt="DTXENT Logo" class="logo-img">
                </a>
                <nav class="admin-nav">
                    <a href="admin.html" class="admin-nav-link">Events</a>
                    <a href="users.html" class="admin-nav-link">Users</a>
                    <a href="settings.html" class="admin-nav-link">Settings</a>
                    <a href="scrape-log.html" class="admin-nav-link active">Scrape Log</a>
                </nav>
            </div>
            <div class="admin-header-right">
                <span class="admin-user" id="admin-email"></span>
                <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="page-header">
                <h1>Scrape Log</h1>
                <button class="btn btn-secondary btn-sm" id="refresh-btn">Refresh</button>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Last Scrape</div>
                    <div class="stat-value stat-value-sm" id="stat-last-scrape">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Runs</div>
                    <div class="stat-value" id="stat-total-runs">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Events Posted</div>
                    <div class="stat-value" id="stat-events-posted">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Errors</div>
                    <div class="stat-value" id="stat-errors">0</div>
                </div>
            </div>

            <!-- Log Entries -->
            <div id="log-entries" class="scrape-log-list">
                <!-- Rendered by JS -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <h3>No Scrape Logs Yet</h3>
                <p>Logs will appear here after the scraping scripts are run.</p>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="scrape-log.js"></script>
</body>

</html>
