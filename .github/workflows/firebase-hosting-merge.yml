name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Node.js for testing
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Run Validation Tests
      - name: Validate Event Data
        run: node tests/validate_events.mjs

      # Sync events to Firestore
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync Events to Firestore
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DTXENT_WEB }}' > /tmp/sa.json
          pip install firebase-admin --quiet
          python execution/sync_firestore_ci.py

      # Deploy Cloud Functions if source changed
      - name: Check for functions changes
        id: functions-diff
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null | grep -q '^functions/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Cloud Functions
        if: steps.functions-diff.outputs.changed == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          npm ci --prefix functions
          npx firebase-tools deploy --only functions --project dtxent-web --non-interactive

      # Deploy to Firebase Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DTXENT_WEB }}'
          channelId: live
          projectId: dtxent-web